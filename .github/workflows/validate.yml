name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  content-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install PyYAML
      - name: Content QA
        run: python3 scripts/validate-content.py --baseline qa-baseline.txt
      - name: Roadmap sync check
        run: python3 scripts/sync-roadmap.py --check
