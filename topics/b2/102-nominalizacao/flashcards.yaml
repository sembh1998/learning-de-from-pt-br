topic: Nominalização
level: B2
cards:
  - front: das Lernen
    back: o aprendizado; o ato de aprender
    example: Das Lernen neuer Wörter braucht Wiederholung.
    example_translation: O aprendizado de novas palavras exige repetição.
  - front: die Entscheidung
    back: a decisão
    example: Die Entscheidung hängt von mehreren Faktoren ab.
    example_translation: A decisão depende de vários fatores.
  - front: die Durchführung
    back: a realização; a execução
    example: Die Durchführung der Studie war gut organisiert.
    example_translation: A realização do estudo foi bem organizada.
  - front: die Anmeldung
    back: a inscrição; o cadastro
    example: Die Anmeldung erfolgt über ein Online-Formular.
    example_translation: A inscrição ocorre por meio de um formulário online.
  - front: die Prüfung
    back: a verificação; o exame
    example: Die Prüfung der Unterlagen dauert drei Tage.
    example_translation: A verificação dos documentos dura três dias.
  - front: die Einführung
    back: a introdução; a implementação inicial
    example: Die Einführung des Systems ist für Juni geplant.
    example_translation: A introdução do sistema está planejada para junho.
  - front: die Auswertung
    back: a avaliação; a análise de resultados
    example: Die Auswertung der Antworten beginnt morgen.
    example_translation: A análise das respostas começa amanhã.
  - front: durch regelmäßiges Üben
    back: por meio de prática regular
    example: Durch regelmäßiges Üben verbessert sich die Aussprache.
    example_translation: Por meio de prática regular, a pronúncia melhora.
  - front: nach der Besprechung
    back: depois da reunião/discussão
    example: Nach der Besprechung schicken wir das Protokoll.
    example_translation: Depois da reunião, enviaremos a ata.
  - front: bei der Durchführung
    back: durante a realização/execução
    example: Bei der Durchführung gab es keine Probleme.
    example_translation: Durante a realização, não houve problemas.
  - front: vor der Entscheidung
    back: antes da decisão
    example: Vor der Entscheidung prüfen wir alle Alternativen.
    example_translation: Antes da decisão, verificamos todas as alternativas.
  - front: die Verbesserung
    back: a melhoria
    example: Die Verbesserung der Prozesse ist notwendig.
    example_translation: A melhoria dos processos é necessária.
