topic: Estilo verbal vs nominal
level: B2
cards:
  - front: analysieren → die Analyse
    back: analisar → a análise
    example: Die Analyse der Ergebnisse ist überzeugend.
    example_translation: A análise dos resultados é convincente.
  - front: untersuchen → die Untersuchung
    back: investigar; estudar → a investigação; o estudo
    example: Die Untersuchung des Problems dauerte drei Monate.
    example_translation: A investigação do problema durou três meses.
  - front: entscheiden über → die Entscheidung über
    back: decidir sobre → a decisão sobre
    example: Die Entscheidung über den Antrag wurde verschoben.
    example_translation: A decisão sobre o requerimento foi adiada.
  - front: entwickeln → die Entwicklung
    back: desenvolver → o desenvolvimento; a evolução
    example: Die Entwicklung neuer Produkte ist teuer.
    example_translation: O desenvolvimento de novos produtos é caro.
  - front: verbessern → die Verbesserung
    back: melhorar → a melhoria
    example: Die Verbesserung der Arbeitsbedingungen ist dringend.
    example_translation: A melhoria das condições de trabalho é urgente.
  - front: einführen → die Einführung
    back: introduzir; implementar → a introdução
    example: Die Einführung des Programms beginnt im Mai.
    example_translation: A introdução do programa começa em maio.
  - front: teilnehmen an → die Teilnahme an
    back: participar de → a participação em
    example: Die Teilnahme an der Konferenz ist kostenlos.
    example_translation: A participação na conferência é gratuita.
  - front: diskutieren über → die Diskussion über
    back: discutir sobre → a discussão sobre
    example: Die Diskussion über die Risiken war offen.
    example_translation: A discussão sobre os riscos foi aberta.
  - front: kritisieren → die Kritik an
    back: criticar → a crítica a
    example: Die Kritik an dem Vorschlag war berechtigt.
    example_translation: A crítica à proposta foi justificada.
  - front: senken → die Senkung
    back: reduzir; baixar → a redução
    example: Die Senkung der Miete wurde gefordert.
    example_translation: A redução do aluguel foi exigida.
  - front: fördern → die Förderung
    back: incentivar; apoiar → o incentivo; o apoio
    example: Die Förderung junger Unternehmen ist sinnvoll.
    example_translation: O apoio a empresas jovens faz sentido.
  - front: umsetzen → die Umsetzung
    back: implementar; executar → a implementação
    example: Die Umsetzung der Strategie braucht Geduld.
    example_translation: A implementação da estratégia exige paciência.
  - front: vergleichen → der Vergleich
    back: comparar → a comparação
    example: Der Vergleich beider Texte zeigt Unterschiede im Stil.
    example_translation: A comparação dos dois textos mostra diferenças de estilo.
  - front: auswerten → die Auswertung
    back: avaliar; analisar dados → a avaliação; análise de dados
    example: Die Auswertung der Interviews ist noch offen.
    example_translation: A avaliação das entrevistas ainda está pendente.
