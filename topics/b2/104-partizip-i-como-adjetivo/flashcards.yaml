topic: Partizip I como adjetivo
level: B2
cards:
  - front: der singende Mann
    back: o homem que canta
    example: Der singende Mann steht jeden Morgen am Marktplatz.
    example_translation: O homem que canta fica toda manhã na praça do mercado.
  - front: ein lächelndes Kind
    back: uma criança sorridente
    example: Ein lächelndes Kind machte allen gute Laune.
    example_translation: Uma criança sorridente deixou todos de bom humor.
  - front: die wartenden Gäste
    back: os convidados que esperam
    example: Die wartenden Gäste saßen schon im Restaurant.
    example_translation: Os convidados que esperavam já estavam sentados no restaurante.
  - front: das schlafende Baby
    back: o bebê que dorme
    example: Das schlafende Baby lag ruhig im Kinderwagen.
    example_translation: O bebê adormecido estava deitado tranquilo no carrinho.
  - front: der weinende Junge
    back: o menino que chora
    example: Der weinende Junge hatte seinen Ball verloren.
    example_translation: O menino que chorava tinha perdido sua bola.
  - front: die steigenden Preise
    back: os preços crescentes
    example: Die steigenden Preise machen vielen Menschen Sorgen.
    example_translation: Os preços crescentes preocupam muitas pessoas.
  - front: die folgende Frage
    back: a pergunta seguinte
    example: Bitte beantworten Sie die folgende Frage schriftlich.
    example_translation: Por favor, responda à pergunta seguinte por escrito.
  - front: im laufenden Jahr
    back: no ano corrente
    example: Im laufenden Jahr sind die Kosten stark gestiegen.
    example_translation: No ano corrente os custos subiram muito.
  - front: das kommende Wochenende
    back: o próximo fim de semana
    example: Für das kommende Wochenende ist Regen angesagt.
    example_translation: Para o próximo fim de semana está prevista chuva.
  - front: die untergehende Sonne
    back: o sol poente
    example: Wir fotografierten die untergehende Sonne am Strand.
    example_translation: Fotografamos o sol poente na praia.
  - front: der vorbeifahrende Zug
    back: o trem que passa
    example: Der vorbeifahrende Zug machte einen großen Lärm.
    example_translation: O trem que passava fazia um barulho enorme.
  - front: eine spannende Geschichte
    back: uma história empolgante
    example: Sie erzählte uns eine spannende Geschichte aus Brasilien.
    example_translation: Ela nos contou uma história empolgante do Brasil.
